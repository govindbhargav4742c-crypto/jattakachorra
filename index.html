<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f8fafc; 
            color: #1e293b;
            font-family: 'Segoe UI', sans-serif;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 240px; 
            background: #0f172a; 
            color: white; 
            padding: 2rem; 
        }
        .logo { 
            font-size: 1.5rem; 
            margin-bottom: 3rem; 
            color: #6366f1;
            font-weight: bold;
        }
        .sidebar ul { list-style: none; }
        .sidebar li { 
            padding: 1rem 0; 
            cursor: pointer; 
            opacity: 0.7; 
            transition: 0.3s; 
        }
        .sidebar li.active, .sidebar li:hover { 
            opacity: 1; 
            color: #6366f1; 
        }
        .content { flex: 1; padding: 2rem; }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem; 
        }
        .stats-grid { 
            display: grid; 
            grid-template-cols: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
        }
        .stat-card { 
            background: white; 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        .stat-card h3 { font-size: 1.8rem; margin: 10px 0; }
        .trend.up { color: #10b981; font-weight: bold; }
        .chart-container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            max-width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">📊 SalesFlow</div>
            <ul>
                <li class="active">📈 Dashboard</li>
                <li>📊 Revenue</li>
                <li>👥 Customers</li>
                <li>⚙️ Settings</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Performance Overview</h1>
                <div class="user-profile">
                    <span>Admin Mode</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <p>Total Sales</p>
                    <h3>$54,230</h3>
                    <span class="trend up">↑ +12.5%</span>
                </div>
                <div class="stat-card">
                    <p>Average Order</p>
                    <h3>$128.50</h3>
                    <span class="trend up">↑ +3.2%</span>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </main>
    </div>

    <!-- Load Chart.js FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Then your script AFTER all elements load -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if element exists
            const chartElement = document.getElementById('revenueChart');
            if (!chartElement) {
                console.error('ERROR: Canvas element with id="revenueChart" not found!');
                return;
            }

            // Check if Chart library loaded
            if (typeof Chart === 'undefined') {
                console.error('ERROR: Chart.js library not loaded!');
                return;
            }

            const ctx = chartElement.getContext('2d');

            // Gradient background for the chart
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(99, 102, 241, 0.5)');
            gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Revenue ($)',
                        data: [1200, 1900, 1700, 2500, 2100, 3200, 2800],
                        borderColor: '#6366f1',
                        borderWidth: 3,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { display: false },
                            ticks: { maxTicksLimit: 5 }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
</body>
</html>
